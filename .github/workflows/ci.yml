name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always
  HARN_INSTALL_ROOT: ${{ github.workspace }}/harn-bin
  HARN_INSTALL_TARGET: ${{ github.workspace }}/target/harn-install
  HARN_ROOT: ${{ github.workspace }}/harn-openapi
  HARN_BIN: ${{ github.workspace }}/harn-bin/bin/harn

jobs:
  harn:
    name: Harn library checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out harn-openapi
        uses: actions/checkout@v6
        with:
          path: harn-openapi

      - name: Read Harn version
        id: harn-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < "$HARN_ROOT/.harn-version")"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Install harn
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.harn-version.outputs.version }}"
          mkdir -p "$HARN_INSTALL_ROOT/bin"
          if [ ! -x "$HARN_BIN" ]; then
            if curl -fsSL \
              -o "${RUNNER_TEMP}/harn.tar.gz" \
              "https://github.com/burin-labs/harn/releases/download/v${version}/harn-x86_64-unknown-linux-gnu.tar.gz"; then
              tar -xzf "${RUNNER_TEMP}/harn.tar.gz" -C "$HARN_INSTALL_ROOT/bin"
            else
              CARGO_TARGET_DIR="$HARN_INSTALL_TARGET" \
                cargo install harn-cli \
                  --version "${version}" \
                  --locked \
                  --root "$HARN_INSTALL_ROOT"
            fi
          fi
          "$HARN_BIN" version

      - name: Check Harn sources
        run: |
          "$HARN_BIN" check \
            src \
            scripts
        working-directory: harn-openapi

      - name: Lint Harn sources
        run: |
          "$HARN_BIN" lint \
            src \
            scripts
        working-directory: harn-openapi

      - name: Check Harn formatting
        run: |
          "$HARN_BIN" fmt --check \
            src \
            scripts \
            tests
        working-directory: harn-openapi

      - name: Run smoke tests
        run: |
          set -euo pipefail
          for test in tests/*.harn; do
            echo "::group::$(basename "$test")"
            "$HARN_BIN" run "$test"
            echo "::endgroup::"
          done
        working-directory: harn-openapi

      - name: Run regen demo
        run: |
          "$HARN_BIN" run scripts/regen_demo.harn
        working-directory: harn-openapi

      - name: Package install smoke
        run: |
          "$HARN_BIN" run scripts/package_install_smoke.harn
        working-directory: harn-openapi

  ci-status:
    name: CI status
    if: always()
    needs: [harn]
    runs-on: ubuntu-latest
    steps:
      - name: Check for failures
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed or were skipped"
