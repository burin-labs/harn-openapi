name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: ${{ github.workspace }}/target
  HARN_ROOT: ${{ github.workspace }}/harn
  HARN_BIN: ${{ github.workspace }}/target/debug/harn

jobs:
  harn:
    name: Harn library checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out harn-openapi
        uses: actions/checkout@v4
        with:
          path: harn-openapi

      - name: Check out harn
        uses: actions/checkout@v4
        with:
          repository: burin-labs/harn
          path: harn

      - name: Cache Cargo build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('harn/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build harn
        run: cargo build --quiet --bin harn
        working-directory: harn

      - name: Check Harn sources
        run: |
          "$HARN_BIN" check \
            ../harn-openapi/src \
            ../harn-openapi/scripts
        working-directory: harn

      - name: Lint Harn sources
        run: |
          "$HARN_BIN" lint \
            ../harn-openapi/src \
            ../harn-openapi/scripts
        working-directory: harn

      - name: Check Harn formatting
        run: |
          "$HARN_BIN" fmt --check \
            ../harn-openapi/src \
            ../harn-openapi/scripts \
            ../harn-openapi/tests
        working-directory: harn

      - name: Run smoke tests
        run: |
          set -euo pipefail
          for test in ../harn-openapi/tests/*.harn; do
            echo "::group::$(basename "$test")"
            "$HARN_BIN" run "$test"
            echo "::endgroup::"
          done
        working-directory: harn

      - name: Run regen demo
        run: "$HARN_BIN" run ../harn-openapi/scripts/regen_demo.harn
        working-directory: harn
