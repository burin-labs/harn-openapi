name: Fixture staleness

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: ${{ github.workspace }}/target
  HARN_BIN: ${{ github.workspace }}/target/debug/harn

jobs:
  check-fixture-staleness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out harn-openapi
        uses: actions/checkout@v6
        with:
          path: harn-openapi

      - name: Check out harn
        uses: actions/checkout@v6
        with:
          repository: burin-labs/harn
          path: harn

      - name: Cache Cargo build outputs
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('harn/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build harn
        run: cargo build --quiet --bin harn
        working-directory: harn

      - name: Check fixture staleness
        run: |
          "$HARN_BIN" run ../harn-openapi/scripts/check_fixture_staleness.harn
        working-directory: harn
