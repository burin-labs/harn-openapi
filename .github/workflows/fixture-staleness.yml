name: Fixture staleness

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  HARN_CLI_VERSION: 0.7.29
  HARN_INSTALL_ROOT: ${{ github.workspace }}/harn-bin
  HARN_INSTALL_TARGET: ${{ github.workspace }}/target/harn-install
  HARN_BIN: ${{ github.workspace }}/harn-bin/bin/harn

jobs:
  check-fixture-staleness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out harn-openapi
        uses: actions/checkout@v6
        with:
          path: harn-openapi

      - name: Cache Harn install
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            harn-bin
            target/harn-install
          key: ${{ runner.os }}-harn-cli-${{ env.HARN_CLI_VERSION }}
          restore-keys: |
            ${{ runner.os }}-harn-cli-

      - name: Install harn
        run: |
          if [ ! -x "$HARN_BIN" ]; then
            CARGO_TARGET_DIR="$HARN_INSTALL_TARGET" \
              cargo install harn-cli \
                --version "$HARN_CLI_VERSION" \
                --locked \
                --root "$HARN_INSTALL_ROOT"
          fi
          "$HARN_BIN" version

      - name: Check fixture staleness
        run: |
          "$HARN_BIN" run scripts/check_fixture_staleness.harn
        working-directory: harn-openapi
